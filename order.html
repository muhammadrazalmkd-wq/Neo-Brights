<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Neo brights</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="public5/image/1.overview_image_53293314_1076212.png" type="image/png">
    <style>
        body {
            background-color: var(--deep-black);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .checkout-container {
            flex: 1;
            max-width: 800px;
            margin: 10rem auto 4rem auto;
            padding: 2rem;
            width: 100%;
        }

        .checkout-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .checkout-dashboard {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .form-group input[type="text"],
        .form-group input[type="tel"],
        .form-group textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.2);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: all 0.3s ease;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(255, 50, 50, 0.6);
            background: rgba(255, 50, 50, 0.05);
        }

        .location-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn-location {
            background: rgba(255, 50, 50, 0.1);
            color: #ffcccc;
            border: 1px solid rgba(255, 50, 50, 0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
        }

        .btn-location:hover {
            background: rgba(255, 50, 50, 0.2);
        }

        .location-display {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: monospace;
            word-break: break-all;
            display: none;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            padding: 1.2rem;
            border-radius: 30px;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            margin-top: 1rem;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
        }
        
        .order-summary {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .order-summary h3 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-family: var(--font-sans);
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--text-primary);
        }
        
        .empty-cart {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.5rem;
            padding: 4rem 0;
            font-family: var(--font-sans);
        }

        @media (max-width: 768px) {
            .checkout-dashboard {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="cart.html" class="social-btn" title="Back to Cart">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
        </div>
        
        <div class="top-bar-center">
            <div class="brand">Neo brights</div>
        </div>

        <div class="top-bar-right">
            <div style="width: 44px; height: 44px;"></div>
        </div>
    </div>

    <div class="checkout-container fade-in-section" style="opacity: 0; transform: translateY(20px);">
        <h1 class="checkout-title">Complete Your Order</h1>
        
        <div id="checkout-content" class="checkout-dashboard">
            <div class="order-summary" id="order-summary">
                <!-- Injected via JS -->
            </div>

            <div class="form-group">
                <label for="order-name">Your Full Name</label>
                <input type="text" id="order-name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="order-phone">Phone Number</label>
                <input type="tel" id="order-phone" placeholder="+91 98765 43210" required>
            </div>

            <div class="form-group">
                <label for="order-address">Delivery Address</label>
                <textarea id="order-address" rows="3" placeholder="House/Flat No, Street, Landmark, City, Pincode" required></textarea>
            </div>

            <div class="location-container">
                <button class="btn-location" id="btn-location">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    Detect Current Location
                </button>
                <div class="location-display" id="location-display">Waiting for location...</div>
            </div>

            <button class="btn-whatsapp" id="btn-whatsapp">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
249:                 </svg>
250:                 Place Order via WhatsApp
251:             </button>
252:         </div>
253:     </div>
254: 
255:     <script>
256:         document.addEventListener("DOMContentLoaded", () => {
257:             const orderSummaryEl = document.getElementById("order-summary");
258:             const checkoutContent = document.getElementById("checkout-content");
259:             const cartContainer = document.querySelector(".checkout-container");
260:             let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];
261: 
262:             if (cart.length === 0) {
263:                 cartContainer.innerHTML = '<div class="empty-cart">Your cart is empty. <br><br><a href="index.html" style="color: #ff3366; text-decoration: none;">Continue Shopping</a></div>';
264:                 
265:                 // Keep animation for empty state
266:                 setTimeout(() => {
267:                     cartContainer.style.opacity = '1';
268:                     cartContainer.style.transform = 'translateY(0)';
269:                     cartContainer.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
270:                 }, 100);
271:                 return;
272:             }
273: 
274:             // Populate Order Summary
275:             let summaryHTML = '<h3>Order Summary</h3>';
276:             let total = 0;
277:             cart.forEach(item => {
278:                 let qty = item.quantity || 1;
279:                 summaryHTML += `
280:                     <div class="summary-item">
281:                         <span>${item.title} &times; ${qty}</span>
282:                         <span>${item.price}</span>
283:                     </div>
284:                 `;
285:                 let priceNum = parseFloat(item.price.replace(/[^0-9.]/g, ''));
286:                 if (!isNaN(priceNum)) {
287:                     total += priceNum * qty;
288:                 }
289:             });
290:             summaryHTML += `
291:                 <div class="summary-total">
292:                     <span>Total Amount:</span>
293:                     <span>₹${total.toFixed(2).replace(/\.00$/, '')}</span>
294:                 </div>
295:             `;
296:             orderSummaryEl.innerHTML = summaryHTML;
297: 
298:             // Location Logic
299:             const btnLocation = document.getElementById("btn-location");
300:             const locationDisplay = document.getElementById("location-display");
301:             let userLocationStr = "";
302: 
303:             btnLocation.addEventListener("click", () => {
304:                 locationDisplay.style.display = "block";
305:                 locationDisplay.textContent = "Fetching location...";
306:                 
307:                 if (navigator.geolocation) {
308:                     navigator.geolocation.getCurrentPosition(
309:                         (position) => {
310:                             const lat = position.coords.latitude;
311:                             const lng = position.coords.longitude;
312:                             const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
313:                             userLocationStr = mapsLink;
314:                             locationDisplay.innerHTML = `Location found! <br> <a href="${mapsLink}" target="_blank" style="color: #ffcccc;">${mapsLink}</a>`;
315:                             btnLocation.textContent = "Location Detected ✓";
316:                             btnLocation.style.background = "rgba(0, 255, 0, 0.1)";
317:                             btnLocation.style.borderColor = "rgba(0, 255, 0, 0.3)";
318:                             btnLocation.style.color = "#aaffaa";
319:                         },
320:                         (error) => {
321:                             locationDisplay.textContent = "Unable to retrieve your location.";
322:                         }
323:                     );
324:                 } else {
325:                     locationDisplay.textContent = "Geolocation is not supported by your browser.";
326:                 }
327:             });
328: 
329:             // WhatsApp Ordering Logic
330:             const btnWhatsapp = document.getElementById("btn-whatsapp");
331:             btnWhatsapp.addEventListener("click", () => {
332:                 const name = document.getElementById("order-name").value.trim();
333:                 const phone = document.getElementById("order-phone").value.trim();
334:                 const address = document.getElementById("order-address").value.trim();
335: 
336:                 if (!name || !phone || !address) {
337:                     alert("Please fill in your Name, Phone Number, and Delivery Address.");
338:                     return;
339:                 }
340: 
341:                 let message = `*NEW ORDER - NEO BRIGHTS*%0A%0A`;
342:                 message += `*Customer Details:*%0A`;
343:                 message += `Name: ${name}%0A`;
344:                 message += `Phone: ${phone}%0A`;
345:                 message += `Address: ${address}%0A`;
346:                 if (userLocationStr) {
347:                     message += `Location Pin: ${userLocationStr}%0A`;
348:                 }
349:                 
350:                 message += `%0A*Order Items:*%0A`;
351:                 cart.forEach(item => {
352:                     let qty = item.quantity || 1;
353:                     message += `- ${item.title} x${qty} (${item.price})%0A`;
354:                 });
355:                 message += `%0A*Total Amount: ₹${total.toFixed(2).replace(/\.00$/, '')}*%0A%0A`;
356:                 message += `Please confirm my order and provide payment details.`;
357: 
358:                 const whatsappNumber = "916235049267";
359:                 window.location.href = `https://wa.me/${whatsappNumber}?text=${message}`;
                </svg>
                Place Order via WhatsApp
            </button>
        </div>
    </div>

</body>
</html>
