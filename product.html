<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Product Details - Neo brights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .product-details-container {
            flex: 1;
            max-width: 800px;
            margin: 8rem auto 4rem auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 4rem;
            align-items: stretch;
        }

        .visual-gallery-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .details-visual {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .details-img {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .details-img.slide-out-left { opacity: 0; transform: translateX(-30px); }
        .details-img.slide-out-right { opacity: 0; transform: translateX(30px); }
        .details-img.slide-in-right { opacity: 0; transform: translateX(30px); }
        .details-img.slide-in-left { opacity: 0; transform: translateX(-30px); }

        .img-wrapper {
            position: relative;
            max-width: 500px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .left-arrow { left: 10px; }
        .right-arrow { right: 10px; }

        .thumbnails-container {
            display: flex;
            gap: 1rem;
            justify-content: flex-start;
            flex-wrap: nowrap;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 0.5rem;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .thumbnails-container::-webkit-scrollbar {
            display: none;
        }

        .thumb-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .thumb-img.active, .thumb-img:hover {
            border-color: #ffffaa;
            transform: scale(1.05);
        }

        .details-info {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .details-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .details-desc {
            font-family: var(--font-sans);
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .specs-list {
            list-style: none;
            padding: 0;
            margin-bottom: 2rem;
        }

        .specs-list li {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            font-family: var(--font-sans);
        }

        .specs-label {
            font-weight: 700;
            color: var(--text-primary);
        }

        .specs-value {
            color: var(--text-muted);
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: var(--text-primary);
            background: rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            border-radius: 30px;
            font-family: var(--font-sans);
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .product-details-container {
                flex-direction: column;
                margin-top: 8rem;
                gap: 2rem;
            }
            .details-title {
                font-size: 2rem;
            }
            .details-info {
                padding: 1.5rem;
            }
        }
        .product-video-container {
            max-width: 800px;
            margin: 0 auto 4rem auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
        }

        .product-video {
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .review-container-wrapper {
            max-width: 800px;
            margin: 0 auto 6rem auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        /* Checkout Dashboard Styles */
        .checkout-dashboard {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .form-group input[type="text"],
        .form-group textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: all 0.3s ease;
            resize: vertical;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(255, 115, 115, 0.5);
            background: rgba(255, 255, 255, 0.06);
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 30px;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .qty-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .qty-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .qty-display {
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 1.2rem;
            min-width: 30px;
            text-align: center;
        }

        .location-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn-location {
            background: rgba(255, 115, 115, 0.15);
            color: #ffb3b3;
            border: 1px solid rgba(255, 115, 115, 0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
        }

        .btn-location:hover {
            background: rgba(255, 115, 115, 0.25);
        }

        .location-display {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: monospace;
            word-break: break-all;
            display: none;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            padding: 1.2rem;
            border-radius: 30px;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            margin-top: 1rem;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
        }

        /* Review Section Styles */
        .review-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: color 0.3s ease;
            margin: 0;
            text-transform: none;
            letter-spacing: normal;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #ffc107;
            text-shadow: 0 0 15px rgba(255, 193, 7, 0.5);
        }
        .file-upload-wrapper {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .file-upload-wrapper:hover {
            border-color: rgba(255, 115, 115, 0.4);
            background: rgba(255, 255, 255, 0.04);
        }
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }
        .file-upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-family: var(--font-sans);
            font-size: 1rem;
            pointer-events: none;
        }
        .btn-submit-review {
            background: linear-gradient(135deg, #ff4d4d, #ff9999);
            color: white;
            padding: 1rem;
            border-radius: 30px;
            font-family: var(--font-sans);
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
            text-transform: uppercase;
        }
        .btn-submit-review:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 77, 77, 0.3);
        }
    </style>
</head>

        document.addEventListener("DOMContentLoaded", () => {
            let selectedColor = ""; // Track color selection globally within DOMContentLoaded

            // Get product ID from URL query parameters
            const urlParams = new URLSearchParams(window.location.search);
            let productId = urlParams.get('id');
            
            if (!productId) {
                productId = 'neon-warm-white';
            }

            const product = productsData[productId];

            if (product) {
                // Populate DOM
                document.getElementById("product-title").textContent = product.title;
                document.getElementById("product-desc").textContent = product.description;
                
                const mainImg = document.getElementById("product-img");
                mainImg.src = product.image;
                mainImg.alt = product.title;

                const thumbnailsContainer = document.getElementById("thumbnails-container");
                thumbnailsContainer.innerHTML = '';

                // Create array of all images
                const allImages = [product.image];
                if (product.extraImages && product.extraImages.length > 0) {
                    allImages.push(...product.extraImages);
                }

                let currentImageIndex = 0;

                const changeImage = (newIndex) => {
                    if (newIndex < 0) newIndex = allImages.length - 1;
                    if (newIndex >= allImages.length) newIndex = 0;
                    if (newIndex === currentImageIndex) return;
                    
                    let isForward = newIndex > currentImageIndex;
                    if (currentImageIndex === allImages.length - 1 && newIndex === 0) isForward = true;
                    if (currentImageIndex === 0 && newIndex === allImages.length - 1) isForward = false;
                    
                    const outClass = isForward ? 'slide-out-left' : 'slide-out-right';
                    const inClass = isForward ? 'slide-in-right' : 'slide-in-left';
                    
                    currentImageIndex = newIndex;
                    const imgSrc = allImages[currentImageIndex];
                    
                    mainImg.classList.add(outClass);
                    
                    setTimeout(() => {
                        mainImg.src = imgSrc;
                        mainImg.classList.remove(outClass);
                        mainImg.classList.add(inClass);
                        
                        void mainImg.offsetWidth;
                        
                        mainImg.classList.remove(inClass);
                    }, 300);

                    // Update thumbnails
                    const allThumbs = document.querySelectorAll('.thumb-img');
                    allThumbs.forEach(t => t.classList.remove('active'));
                    if(allThumbs[currentImageIndex]) {
                        allThumbs[currentImageIndex].classList.add('active');
                        allThumbs[currentImageIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                };

                // Render Color Selectors if available
                const colorContainer = document.getElementById("color-selector-container");
                const colorButtons = document.getElementById("color-buttons");
                
                if (product.colors && product.colors.length > 0) {
                    colorContainer.style.display = "block";
                    colorButtons.innerHTML = '';
                    product.colors.forEach(colorObj => {
                        const btn = document.createElement("button");
                        btn.title = colorObj.name;
                        btn.style.width = "30px";
                        btn.style.height = "30px";
                        btn.style.borderRadius = "50%";
                        btn.style.border = "2px solid rgba(255,255,255,0.2)";
                        btn.style.backgroundColor = colorObj.colorCode;
                        btn.style.cursor = "pointer";
                        btn.style.transition = "all 0.3s ease";
                        
                        btn.addEventListener("mouseover", () => {
                            if (selectedColor !== colorObj.name) {
                                btn.style.transform = "scale(1.1)";
                                btn.style.borderColor = "#fff";
                            }
                        });
                        btn.addEventListener("mouseout", () => {
                            if (selectedColor !== colorObj.name) {
                                btn.style.transform = "scale(1)";
                                btn.style.borderColor = "rgba(255,255,255,0.2)";
                            }
                        });
                        
                        btn.addEventListener("click", () => {
                            changeImage(colorObj.imageIndex);
                            selectedColor = colorObj.name;
                            
                            // Update active state visuals
                            Array.from(colorButtons.children).forEach(b => {
                                b.style.transform = "scale(1)";
                                b.style.borderColor = "rgba(255,255,255,0.2)";
                                b.style.boxShadow = "none";
                            });
                            btn.style.transform = "scale(1.1)";
                            btn.style.borderColor = "#fff";
                            btn.style.boxShadow = "0 0 10px rgba(255,255,255,0.8)";
                        });
                        colorButtons.appendChild(btn);
                    });
                } else {
                    colorContainer.style.display = "none";
                }

                // Add thumbnails
                allImages.forEach((imgSrc, index) => {
                    const thumb = document.createElement('img');
                    thumb.src = imgSrc;
                    thumb.alt = `${product.title} - View ${index + 1}`;
                    thumb.className = 'thumb-img' + (index === 0 ? ' active' : '');
                    thumb.addEventListener('click', () => {
                        changeImage(index);
                    });
                    thumbnailsContainer.appendChild(thumb);
                });

                // Add event listeners for arrows
                document.getElementById('prev-btn').addEventListener('click', () => {
                    changeImage(currentImageIndex - 1);
                });
                
                document.getElementById('next-btn').addEventListener('click', () => {
                    changeImage(currentImageIndex + 1);
                });



                // Populate Specs
                const specsList = document.getElementById("product-specs");
                specsList.innerHTML = ''; // Clear loading text
                
                for (const [key, value] of Object.entries(product.specs)) {
                    const li = document.createElement("li");
                    
                    const label = document.createElement("span");
                    label.className = "specs-label";
                    label.textContent = key;
                    
                    const val = document.createElement("span");
                    val.className = "specs-value";
                    val.textContent = value;

                    li.appendChild(label);
                    li.appendChild(val);
                    specsList.appendChild(li);
                }
            } else {
                document.getElementById("product-title").textContent = "Product Not Found";
                document.getElementById("product-desc").textContent = "The product you are looking for does not exist or has been removed.";
                document.getElementById("product-specs").innerHTML = '';
            }

            // Simple Fade In animation
            const fadeElements = document.querySelectorAll('.fade-in-section');
            fadeElements.forEach(el => {
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                    el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                }, 100);
            });

            // E-Commerce Dashboard Logic
            let currentQuantity = 1;
            let currentLocation = "";

            const qtyDisplay = document.getElementById("qty-display");
            const btnMinus = document.getElementById("btn-qty-minus");
            const btnPlus = document.getElementById("btn-qty-plus");

            btnMinus.addEventListener("click", () => {
                if (currentQuantity > 1) {
                    currentQuantity--;
                    qtyDisplay.textContent = currentQuantity;
                }
            });

            btnPlus.addEventListener("click", () => {
                currentQuantity++;
                qtyDisplay.textContent = currentQuantity;
            });

            const btnAddCart = document.getElementById("btn-add-cart");
            if(btnAddCart) {
                btnAddCart.addEventListener("click", () => {
                    let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];
                    
                    let finalTitle = product.title;
                    if (selectedColor) {
                        finalTitle += ` - ${selectedColor}`;
                    }

                    // Use the currently displayed image from the DOM
                    const imgElement = document.getElementById("product-img");
                    let finalImage = imgElement ? imgElement.src : product.image;
                    // If the src is an absolute localhost URL, convert it to a relative path to match existing cart data
                    if (finalImage.includes(window.location.host)) {
                        finalImage = finalImage.substring(finalImage.indexOf(window.location.host) + window.location.host.length);
                        if (finalImage.startsWith('/')) finalImage = finalImage.substring(1);
                    }

                    cart.push({
                        id: productId,
                        title: finalTitle,
                        image: finalImage,
                        quantity: currentQuantity
                    });
                    localStorage.setItem("neo_cart", JSON.stringify(cart));
                    
                    // Visual feedback
                    const originalText = btnAddCart.innerHTML;
                    btnAddCart.innerHTML = "Added to Cart ✓";
                    btnAddCart.style.background = "#25D366";
                    
                    setTimeout(() => {
                        window.location.href = "cart.html";
                    }, 800);
                });
            }

            // Review Form Logic
            const fileInput = document.getElementById('product-photo');
            const fileNameDisplay = document.getElementById('file-name');
            const fileWrapper = document.getElementById('file-upload-wrapper');

            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    fileNameDisplay.textContent = this.files[0].name;
                    fileWrapper.style.borderColor = "var(--border-color)";
                    fileWrapper.style.background = "rgba(255, 115, 115, 0.1)";
                } else {
                    fileNameDisplay.textContent = "Drag & Drop or Click to Upload";
                    fileWrapper.style.borderColor = "rgba(255, 255, 255, 0.2)";
                    fileWrapper.style.background = "rgba(255, 255, 255, 0.02)";
                }
            });

            const reviewForm = document.getElementById('review-form');
            reviewForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = reviewForm.querySelector('.btn-submit-review');
                const originalText = btn.textContent;
                btn.textContent = "Submitting...";
                btn.style.opacity = 0.7;
                
                setTimeout(() => {
                    alert("Thank you for your rating & review!");
                    reviewForm.reset();
                    fileNameDisplay.textContent = "Drag & Drop or Click to Upload";
                    btn.textContent = originalText;
                    btn.style.opacity = 1;
                }, 1000);
            });
        });
    </script>
