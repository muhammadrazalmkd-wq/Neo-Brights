<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile View</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        .phone-wrapper {
            position: relative;
            width: 390px;
            height: 844px;
            background-color: #000;
            border-radius: 45px;
            box-shadow: 0 0 0 12px #2c2c2c, 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 30px;
            background-color: #000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        .instruction {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="instruction">Scroll inside the phone 👇</div>
    <div class="phone-wrapper">
        <div class="notch"></div>
        <iframe src="index.html"></iframe>
    </div>
</body>
</html>
