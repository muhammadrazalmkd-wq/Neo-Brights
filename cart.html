<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Neo brights</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--deep-black);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .cart-container {
            flex: 1;
            max-width: 1000px;
            margin: 10rem auto 4rem auto;
            padding: 2rem;
            width: 100%;
        }

        .cart-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            gap: 1.5rem;
        }

        .cart-item-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-size: 1.5rem;
            font-family: var(--font-serif);
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--text-muted);
            font-family: var(--font-sans);
            font-size: 1.2rem;
        }

        .remove-btn {
            background: rgba(255, 50, 50, 0.1);
            color: #ff5555;
            border: 1px solid rgba(255, 50, 50, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: rgba(255, 50, 50, 0.3);
        }

        .cart-summary {
            background: rgba(30, 5, 5, 0.5);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 50, 50, 0.15);
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1rem;
        }

        .cart-total {
            font-size: 2rem;
            font-family: var(--font-serif);
            margin-bottom: 0.5rem;
        }

        .checkout-actions {
            display: flex;
            gap: 1rem;
        }

        .checkout-btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff3366, #ff0044);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 30px;
            font-family: var(--font-sans);
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255,50,100,0.4);
            cursor: pointer;
            border: none;
        }

        .checkout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,50,100,0.6);
        }

        .checkout-dashboard {
            background: rgba(255, 255, 255, 0.03);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            text-align: left;
            margin-top: 1.5rem;
            box-sizing: border-box;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .form-group input[type="text"],
        .form-group input[type="tel"],
        .form-group textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.2);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: all 0.3s ease;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(255, 50, 50, 0.6);
            background: rgba(255, 50, 50, 0.05);
        }

        .location-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn-location {
            background: rgba(255, 50, 50, 0.1);
            color: #ffcccc;
            border: 1px solid rgba(255, 50, 50, 0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
        }

        .btn-location:hover {
            background: rgba(255, 50, 50, 0.2);
        }

        .location-display {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: monospace;
            word-break: break-all;
            display: none;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            padding: 1.2rem;
            border-radius: 30px;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            width: 100%;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
        }

        .empty-cart {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.5rem;
            padding: 4rem 0;
            font-family: var(--font-sans);
        }

        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
            .cart-summary {
                align-items: center;
                text-align: center;
            }
            .checkout-actions {
                flex-direction: column;
            }
        }

        /* Success Modal */
        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .success-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-content {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .success-modal.show .success-content {
            transform: scale(1);
        }

        .check-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(37, 211, 102, 0.2);
            color: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            border: 2px solid #25D366;
        }

        .check-icon svg {
            width: 40px;
            height: 40px;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        .success-modal.show .check-icon svg {
            animation: drawCheck 1s ease forwards 0.3s;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        .success-content h2 {
            font-family: var(--font-serif);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: white;
        }
        
        .success-content p {
            font-family: var(--font-sans);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    
    <!-- SUCCESS MODAL -->
    <div id="success-modal" class="success-modal">
        <div class="success-content">
            <div class="check-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            <h2>Order Successful!</h2>
            <p>Thank you! Your order has been placed successfully.</p>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 1rem;">Redirecting to WhatsApp to complete your order...</p>
        </div>
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="index.html" class="social-btn" title="Back Home">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </a>
        </div>
        
        <div class="top-bar-center">
            <div class="brand">Neo brights</div>
        </div>

        <div class="top-bar-right">
            <!-- Space holder to keep center aligned -->
            <div style="width: 44px; height: 44px;"></div>
        </div>
    </div>

    <div class="cart-container">
        <h1 class="cart-title">Your Cart</h1>
        <div id="cart-items-container" class="cart-items">
            <!-- Cart items injected via JS -->
        </div>

        <div id="cart-summary" class="cart-summary" style="display: none;">
            <div class="checkout-actions">
                <button class="remove-btn" onclick="clearCart()">Clear Cart</button>
            </div>
            
            <div id="checkout-content" class="checkout-dashboard">
                <h3 style="font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 0;">Checkout Details</h3>
                
                <div class="form-group">
                    <label for="order-name">Your Full Name</label>
                    <input type="text" id="order-name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="order-address">Delivery Address</label>
                    <textarea id="order-address" rows="3" placeholder="House/Flat No, Street, Landmark, City, Pincode" required></textarea>
                </div>

                <div class="location-container">
                    <button class="btn-location" id="btn-location">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                        Detect Current Location
                    </button>
                    <div class="location-display" id="location-display">Waiting for location...</div>
                </div>

                <button class="btn-whatsapp" id="btn-whatsapp">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    Place Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        function loadCart() {
            const cartItemsContainer = document.getElementById("cart-items-container");
            const cartSummary = document.getElementById("cart-summary");
            
            let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="empty-cart">Your cart is empty. <br><br><a href="index.html" style="color: #ff3366; text-decoration: none;">Continue Shopping</a></div>';
                cartSummary.style.display = "none";
                return;
            }

            cartSummary.style.display = "flex";
            cartItemsContainer.innerHTML = "";

            cart.forEach((item, index) => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "cart-item fade-in-section";
                itemDiv.innerHTML = `
                    <img src="${item.image}" alt="${item.title}" class="cart-item-img">
                    <div class="cart-item-info">
                        <h2 class="cart-item-title">${item.title}</h2>
                        <div class="cart-item-price">Qty: ${item.quantity || 1}</div>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                `;
                cartItemsContainer.appendChild(itemDiv);
            });

            // Trigger animation for newly rendered items
            setTimeout(() => {
                document.querySelectorAll('.fade-in-section').forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                    el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                });
            }, 50);
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("neo_cart", JSON.stringify(cart));
            loadCart();
        }

        function clearCart() {
            if(confirm("Are you sure you want to clear your cart?")) {
                localStorage.removeItem("neo_cart");
                loadCart();
            }
        }

        let userLocationStr = "";

        document.addEventListener("DOMContentLoaded", () => {
            loadCart();
            
            // Listen for cross-tab cart updates
            window.addEventListener("storage", function(e) {
                if (e.key === "neo_cart") {
                    loadCart();
                }
            });
            
            // Location Logic
            const btnLocation = document.getElementById("btn-location");
            const locationDisplay = document.getElementById("location-display");

            btnLocation.addEventListener("click", () => {
                locationDisplay.style.display = "block";
                locationDisplay.textContent = "Fetching location...";
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            const accuracy = position.coords.accuracy.toFixed(0);
                            const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                            
                            userLocationStr = mapsLink;
                            
                            btnLocation.textContent = "Location Detected ✓";
                            btnLocation.style.background = "rgba(0, 255, 0, 0.1)";
                            btnLocation.style.borderColor = "rgba(0, 255, 0, 0.3)";
                            btnLocation.style.color = "#aaffaa";
                            
                            locationDisplay.innerHTML = `Location found! (Accuracy: ${accuracy}m)<br>Fetching exact street address...`;

                            try {
                                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
                                const data = await response.json();
                                if(data && data.display_name) {
                                    userLocationStr += `%0AAddress: ${data.display_name}`;
                                    locationDisplay.innerHTML = `<strong style="color:white;">Accurate Address Detected:</strong><br>${data.display_name}<br><br><a href="${mapsLink}" target="_blank" style="color: #ffcccc;">View on Google Maps</a>`;
                                } else {
                                    locationDisplay.innerHTML = `Location found! (Accuracy: ${accuracy}m)<br><a href="${mapsLink}" target="_blank" style="color: #ffcccc;">${mapsLink}</a>`;
                                }
                            } catch (err) {
                                locationDisplay.innerHTML = `Location found! (Accuracy: ${accuracy}m)<br><a href="${mapsLink}" target="_blank" style="color: #ffcccc;">${mapsLink}</a>`;
                            }
                        },
                        (error) => {
                            locationDisplay.textContent = "Unable to retrieve your location. Please enable location permissions.";
                        },
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                } else {
                    locationDisplay.textContent = "Geolocation is not supported by your browser.";
                }
            });

            // WhatsApp Ordering Logic
            const btnWhatsapp = document.getElementById("btn-whatsapp");
            btnWhatsapp.addEventListener("click", () => {
                let cart = JSON.parse(localStorage.getItem("neo_cart")) || [];
                if(cart.length === 0) {
                    alert("Your cart is empty.");
                    return;
                }

                const name = document.getElementById("order-name").value.trim();
                const address = document.getElementById("order-address").value.trim();

                if (!name || !address) {
                    alert("Please fill in your Name and Delivery Address.");
                    return;
                }

                let message = `*NEW ORDER - NEO BRIGHTS*%0A%0A`;
                message += `*Customer Details:*%0A`;
                message += `Name: ${name}%0A`;
                message += `Address: ${address}%0A`;
                if (userLocationStr) {
                    message += `Location Pin: ${userLocationStr}%0A`;
                }
                
                message += `%0A*Order Items:*%0A`;
                cart.forEach(item => {
                    let qty = item.quantity || 1;
                    message += `- ${item.title} x${qty}%0A`;
                });
                message += `%0APlease confirm my order and provide payment details.`;

                const whatsappNumber = "916235049267";
                const waUrl = `https://wa.me/${whatsappNumber}?text=${message}`;
                
                // Show Success Animation
                const modal = document.getElementById('success-modal');
                modal.classList.add('show');

                // Wait 2.5 seconds, clear cart, and redirect
                setTimeout(() => {
                    localStorage.removeItem("neo_cart");
                    window.location.href = waUrl;
                }, 2500);
            });
        });
    </script>
</body>
</html>
